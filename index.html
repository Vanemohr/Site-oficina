<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programação Paraná - O Futuro é Agora</title>
    <style>
        /* Estilização Geral */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Imagem de Fundo Realista */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('/img/imagem.programacao.png'); /* Substitua pelo link da imagem gerada */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            color: #00d4ff;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
        }

        /* Player de Áudio Customizado */
        .audio-player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button {
            background: #00d4ff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0099cc;
            transform: scale(1.05);
        }

        input[type="range"] {
            flex-grow: 1;
            cursor: pointer;
        }

        /* Vídeo do YouTube */
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #00d4ff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <h1>Programação Paraná</h1>
        <p>Acompanhe a trilha da inovação. Estudantes e professores conectados pelo código.</p>

        <div class="audio-player">
            <div class="controls">
                <button id="playPause">PLAY</button>
                <input type="range" id="seekSlider" value="0" max="100">
            </div>
            <audio id="myAudio">
                <source src="Concursos de Programação Paraná.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>
        </div>

        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/M7lc1UVf-VE" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playPause');
        const seekSlider = document.getElementById('seekSlider');

        // Play/Pause toggle
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = 'PAUSE';
            } else {
                audio.pause();
                playBtn.innerText = 'PLAY';
            }
        });

        // Atualizar linha do tempo
        audio.addEventListener('timeupdate', () => {
            const position = audio.currentTime / audio.duration;
            seekSlider.value = position * 100;
        });

        // Mudar tempo ao arrastar o slider
        seekSlider.addEventListener('input', () => {
            audio.currentTime = (seekSlider.value / 100) * audio.duration;
        });
    </script>

</body>
</html>
